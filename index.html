<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Copa 2026 - Escalações</title>
<style>
/* layout simples, abas e avatar SVG via CSS */
body{font-family:Arial;margin:0;padding:0;background:#f4f6f8;color:#111}
.nav{display:flex;gap:8px;padding:12px;background:#0b3d91;color:#fff}
.tab{padding:16px}
.team-card{border:1px solid #ddd;padding:12px;margin:8px;border-radius:8px;background:#fff}
.avatar{width:64px;height:64px;border-radius:8px;background:linear-gradient(135deg,#ffd54f,#ff7043);display:inline-block}
.star{font-weight:bold;color:#d32f2f}
</style>
</head>
<body>
<div class="nav">
<button onclick="show('teams')">Seleções</button>
<button onclick="show('squads')">Escalações</button>
<button onclick="show('quiz')">Quiz</button>
</div>
<div id="content" class="tab"></div>

<script>
// Carrega squads.json e renderiza
async function loadData(){
  const res = await fetch('squads.json');
  const data = await res.json();
  window.squads = data;
  renderTeams();
}
function show(id){ document.getElementById('content').innerHTML=''; if(id==='teams') renderTeams(); if(id==='squads') renderSquads(); if(id==='quiz') renderQuiz(); }
function renderTeams(){
  const c=document.getElementById('content');
  for(const team of window.squads.teams){
    const div=document.createElement('div'); div.className='team-card';
    div.innerHTML = `<div style="display:flex;align-items:center;gap:12px">
      <div class="avatar" title="${team.name}"></div>
      <div><strong>${team.name}</strong><div class="star">Estrela: ${team.star}</div></div>
    </div>`;
    c.appendChild(div);
  }
}
function renderSquads(){
  const c=document.getElementById('content');
  for(const team of window.squads.teams){
    const div=document.createElement('div'); div.className='team-card';
    div.innerHTML = `<strong>${team.name}</strong><div>Jogadores: ${team.players.map(p=>p.name).join(', ')}</div>`;
    c.appendChild(div);
  }
}
function renderQuiz(){
  const c=document.getElementById('content');
  const q = window.squads.teams.slice(0,10).map(t=>({q:`Quem é a estrela da ${t.name}?`, a:t.star}));
  let idx=0;
  const el=document.createElement('div');
  el.innerHTML = `<div id="qbox"></div><button id="next">Próxima</button><div id="res"></div>`;
  c.appendChild(el);
  document.getElementById('next').onclick=()=>{ const cur=q[idx]; document.getElementById('qbox').innerHTML=cur.q; document.getElementById('res').innerHTML=''; idx=(idx+1)%q.length; };
  document.getElementById('next').click();
}
loadData();
</script>
</body>
</html>
